services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    network_mode: host
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    dns:
      - 8.8.8.8
      - 8.8.4.4

  redis:
    image: redis:7-alpine
    restart: always
    network_mode: host
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    dns:
      - 8.8.8.8
      - 8.8.4.4

  minio:
    image: minio/minio
    restart: always
    ports:
      - "${MINIO_ENDPOINT_PORT:-9005}:9000"
      - "${MINIO_CONSOLE_PORT:-9006}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    dns:
      - 8.8.8.8
      - 8.8.4.4

  email-service:
    build:
      context: ./email-service
    restart: always
    network_mode: host
    env_file:
      - .env
    dns:
      - 8.8.8.8
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - MINIO_ENDPOINT=127.0.0.1
      - MINIO_PORT=9005
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
      - APP_DB_HOST=127.0.0.1
      - APP_DB_PORT=5432
      - EMAIL_BUCKET=email-attachments
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 8.8.4.4

  whatsapp-service:
    build:
      context: ./whatsapp-service
    restart: always
    network_mode: host
    env_file:
      - .env
    environment:
      - DB_HOST=127.0.0.1
      - DB_PORT=5432
      - MINIO_ENDPOINT=127.0.0.1
      - MINIO_PORT=9005
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_WHATSAPP_BUCKET=whatsapp-attachments
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 8.8.4.4

volumes:
  postgres_data:
  redis_data:
  minio_data:
